<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فواتير المدراء | MEDS Digital Services</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --primary: #0d9488;
      --primary-dark: #0a7a6e;
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface-muted: #f7fafc;
      --text: #0f1923;
      --muted: #5a6b7a;
      --line: #dde6ed;
      --danger: #dc2626;
      --shadow-sm: 0 2px 8px rgba(15,25,35,0.07);
      --shadow: 0 8px 32px rgba(15,25,35,0.10);
    }
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    /* Admin header styles copied from manager-dashboard to ensure exact layout */
    .admin-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: 12px 24px;
      box-shadow: var(--shadow-sm);
    }

    .header-wrapper {
      display: grid;
      grid-template-columns: minmax(260px, auto) minmax(240px, 1fr) auto;
      align-items: center;
      gap: 18px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .brand { display: flex; align-items: center; gap: 16px; min-width: 0; }
    .logo { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: grid; place-items: center; color: white; font-weight: 900; font-size: 1.4rem; }
    .brand-text h1 { margin: 0; font-size: 1.2rem; font-weight: 800; }
    .brand-text span { font-size: 0.8rem; color: var(--muted); }

    .header-nav { display: flex; gap: 8px; align-items: center; justify-content: center; width: fit-content; justify-self: center; padding: 6px; border: 1px solid var(--line); border-radius: 16px; background: var(--surface-muted); }
    .nav-btn, .nav-link { padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--text); cursor: pointer; font-weight: 700; transition: all 0.15s; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-btn:hover, .nav-btn.active, .nav-link:hover { background: var(--surface); border-color: var(--primary); color: var(--primary-dark); box-shadow: var(--shadow-sm); }

    .header-actions { display:flex; align-items:center; gap:12px; justify-content:flex-end; }
    .profile-menu-wrap { position: relative; }
    .profile-menu { position: absolute; top: calc(100% + 10px); left: 0; min-width: 190px; padding: 8px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface); box-shadow: var(--shadow); display: none; z-index: 20; }
    .profile-menu-wrap.open .profile-menu { display: grid; gap: 6px; }
    .profile-menu button { width: 100%; min-height: 42px; border: 0; border-radius: 10px; background: transparent; color: var(--text); cursor: pointer; text-align: right; padding: 8px 10px; font-weight: 800; }
    .profile-menu button:hover { background: rgba(13,148,136,0.1); color: var(--primary-dark); }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
    }
    .header-inner {
      display: grid;
      grid-template-columns: minmax(240px, auto) minmax(240px, 1fr) auto;
      gap: 16px;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 900;
    }
    .header-brand .bmark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 1.1rem;
    }
    .header-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface-muted);
    }
    .nav-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid transparent;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      transition: all 0.15s;
    }
    .nav-tab:hover,
    .nav-tab.active {
      background: var(--surface);
      border-color: var(--primary);
      color: var(--primary-dark);
      box-shadow: var(--shadow-sm);
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .status-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 12px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--surface-muted); color: var(--text); }
    .user-menu { position: relative; }
    .user-avatar-btn {
      width: 38px;
      height: 38px;
      border: 2px solid var(--line);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .user-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 20;
    }
    .user-dropdown.open { display: grid; gap: 6px; }
    .dropdown-user-info { padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .dropdown-user-info .name { font-size: 0.95rem; font-weight: 800; }
    .dropdown-user-info .role { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      text-align: right;
      font-family: inherit;
      transition: background 0.12s;
    }
    .dropdown-item:hover { background: var(--surface-muted); }
    .dropdown-item.danger { color: var(--danger); }

    .page-shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 26px 24px 40px;
    }
    .page-head {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-head h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2vw, 2.25rem);
      font-weight: 900;
    }
    .page-head p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 720px;
    }
    .department-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .dept-filter-btn {
      min-height: 54px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .dept-filter-btn:hover,
    .dept-filter-btn.active {
      border-color: var(--primary);
      color: var(--primary-dark);
      background: rgba(13,148,136,0.08);
      transform: translateY(-1px);
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 18px;
      align-items: center;
    }
    .inv-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .inv-chip {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--surface-muted);
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .inv-chip:hover { border-color: var(--primary); color: var(--primary-dark); }
    .inv-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .inv-table-wrap {
      width: 100%;
      overflow-x: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
    }
    .inv-table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }
    .inv-table thead th {
      text-align: right;
      padding: 14px 18px;
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--muted);
      background: var(--surface-muted);
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .inv-table tbody td {
      padding: 14px 18px;
      font-size: 0.92rem;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    .inv-table tbody tr:last-child td { border-bottom: none; }
    .inv-table tbody tr:hover { background: var(--surface-muted); }
    .inv-dom-cell { display: flex; align-items: center; gap: 10px; }
    .inv-dom-ico {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 0.95rem;
    }
    .inv-amount { font-weight: 800; }
    .inv-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-start;
    }
    .inv-action-btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--line);
      background: var(--surface);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .inv-action-btn:hover { border-color: var(--primary); color: var(--primary-dark); }
    .inv-delete-btn {
      border-color: rgba(220, 38, 38, 0.25);
      color: var(--danger);
    }
    .inv-delete-btn:hover { background: rgba(220, 38, 38, 0.08); }
    .inv-empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .inv-empty .ico { font-size: 2.4rem; margin-bottom: 12px; }
    .inv-empty h3 { margin: 0 0 8px; font-size: 1.15rem; font-weight: 800; color: var(--text); }
    .inv-empty p { margin: 0; }
    @media (max-width: 900px) {
      .header-inner { grid-template-columns: 1fr; }
      .header-controls { justify-content: flex-start; }
      .inv-table { min-width: 680px; }
      .filter-row { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <script src="js/config.js"></script>
  <!-- HEADER (exact copy from manager-dashboard.html) -->
  <header class="admin-header">
    <div class="header-wrapper">
      <div class="brand">
        <div class="logo">M</div>
        <div class="brand-text">
          <h1>MEDS Digital Services</h1>
          <span>لوحة تحكم المدير العام</span>
        </div>
      </div>

      <nav class="header-nav">
        <button class="nav-btn active" type="button" onclick="setOrderFilter('all')">
          <span>لوحة التحكم</span>
        </button>
        <button class="nav-btn" type="button" onclick="window.location.href='manager-invoices.html'">
          <span>الفواتير</span>
        </button>
      </nav>

      <div class="header-actions">
        <button class="nav-link strong super-admin-only hidden" type="button" onclick="showUsersPanel()">إدارة المستخدمين</button>
        <a class="nav-link" href="chats.html">الدردشة</a>
        <button class="icon-btn" id="themeToggle" title="تبديل المظهر">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="icon-btn" title="الإشعارات">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="badge-notif"></span>
        </button>
        <div class="profile-menu-wrap" id="profileMenuWrap">
          <button class="icon-btn" id="profileMenuBtn" title="الملف الشخصي">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>
          <div class="profile-menu" id="profileMenu">
            <button type="button" onclick="showProfileNotice()">الملف الشخصي</button>
            <button type="button" onclick="logoutUser()">تسجيل الخروج</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div id="globalNoticeContainer" class="global-notice-container" aria-live="polite"></div>

  <!-- PROFILE MODAL (full, from manager-dashboard) -->
  <div id="profileModalBackdrop" class="modal-backdrop" role="dialog" aria-hidden="true">
    <div class="modal" role="document" id="profileModal">
      <div class="modal-header">
        <h3 style="margin:0;font-size:1.1rem;font-weight:800">الملف الشخصي</h3>
        <button class="mini-action" onclick="closeProfileModal()">إغلاق</button>
      </div>
      <div class="modal-body">
        <label>الاسم الأول<input id="profile_first_name" type="text" placeholder="الاسم الأول" style="width:100%;min-height:40px;padding:8px;border-radius:8px;border:1px solid var(--line)"></label>
        <label>اسم العائلة<input id="profile_last_name" type="text" placeholder="اسم العائلة" style="width:100%;min-height:40px;padding:8px;border-radius:8px;border:1px solid var(--line)"></label>
        <label>البريد<input id="profile_email" type="email" placeholder="البريد الإلكتروني" style="width:100%;min-height:40px;padding:8px;border-radius:8px;border:1px solid var(--line)"></label>
        <label>الهاتف<input id="profile_phone" type="tel" placeholder="الهاتف" style="width:100%;min-height:40px;padding:8px;border-radius:8px;border:1px solid var(--line)"></label>
        <div style="display:grid;gap:8px">
          <label>كلمة المرور الحالية
            <input id="profile_current_password" type="password" placeholder="كلمة المرور الحالية" style="width:100%;min-height:40px;padding:8px;border-radius:8px;border:1px solid var(--line)">
          </label>
          <label>كلمة المرور الجديدة
            <input id="profile_new_password" type="password" placeholder="كلمة المرور الجديدة (6 أحرف على الأقل)" style="width:100%;min-height:40px;padding:8px;border-radius:8px;border:1px solid var(--line)">
          </label>
          <label>تأكيد كلمة المرور الجديدة
            <input id="profile_new_password_confirm" type="password" placeholder="أعد كتابة كلمة المرور الجديدة" style="width:100%;min-height:40px;padding:8px;border-radius:8px;border:1px solid var(--line)">
          </label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="mini-action" onclick="closeProfileModal()">إلغاء</button>
        <button class="mini-action" id="saveProfileBtn" onclick="submitProfileForm()">حفظ</button>
      </div>
    </div>
  </div>
<main class="page-shell">
  <div class="page-head">
    <div>
      <h1>فواتير المدراء</h1>
      <p>عرض ومتابعة الفواتير لكل الأقسام. استخدم فلتر القسم ثم اختر الحالة لترتيب الفواتير بسرعة.</p>
    </div>
    <button class="inv-action-btn" id="btnRefreshInvoices" style="border-color: var(--primary); color: var(--primary);">🔄 تحديث</button>
  </div>

  <div class="department-filter active" id="departmentFilter">
    <button class="dept-filter-btn active" data-department="all">كل الأقسام</button>
    <button class="dept-filter-btn" data-department="dev">البرمجة</button>
    <button class="dept-filter-btn" data-department="mkt">التسويق</button>
    <button class="dept-filter-btn" data-department="sec">الأمن السيبراني</button>
  </div>

  <div class="filter-row">
    <div class="inv-chips" id="invChips">
      <button class="inv-chip active" data-status="all">الكل</button>
      <button class="inv-chip" data-status="pending">قيد الدفع</button>
      <button class="inv-chip" data-status="paid">مدفوعة</button>
      <button class="inv-chip" data-status="overdue">متأخرة</button>
    </div>
  </div>

  <div id="invoicesContainer">
    <div class="inv-empty"><div class="ico">🧾</div><h3>جارٍ التحميل...</h3><p>انتظر لحظة بينما نجلب الفواتير.</p></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const token = sessionStorage.getItem('token') || localStorage.getItem('token');
const API_ORIGIN = (typeof API_CONFIG !== 'undefined' && API_CONFIG.BASE) ? API_CONFIG.BASE.replace('/api','') : (window.API_ORIGIN || window.location.origin || 'http://localhost:3000');
if (!token) {
  window.location.href = 'login.html';
}
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = (ok ? '✅ ' : '❌ ') + msg;
  el.className = 'toast show';
  setTimeout(() => el.className = 'toast', 2600);
}
function escapeHtml(v) {
  return String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function formatDate(value) {
  if (!value) return '—';
  const d = new Date(value);
  return isNaN(d.getTime()) ? '—' : d.toLocaleDateString('ar-DZ');
}
function formatAmount(value) {
  return Number(value || 0).toLocaleString('ar-DZ') + ' دج';
}
const DOMAIN_META = {
  dev: { icon: '💻', gradient: 'linear-gradient(135deg,#0d9488,#2563eb)', label: 'البرمجة' },
  mkt: { icon: '📣', gradient: 'linear-gradient(135deg,#8b5cf6,#ec4899)', label: 'التسويق' },
  sec: { icon: '🔒', gradient: 'linear-gradient(135deg,#dc2626,#f59e0b)', label: 'الأمن السيبراني' },
  other: { icon: '📁', gradient: 'linear-gradient(135deg,var(--primary),var(--primary-dark))', label: 'أخرى' }
};
const STATUS_META = {
  paid: { label: 'مدفوعة', class: 'paid' },
  pending: { label: 'قيد الدفع', class: 'pending' },
  overdue: { label: 'متأخرة', class: 'overdue' }
};
let allInvoices = [];
let activeDept = 'all';
let activeStatus = 'all';
function resolveDomain(inv) {
  if (inv.domain && DOMAIN_META[inv.domain]) return inv.domain;
  const text = `${inv.project_title||inv.project_name||inv.service_name||''}`.toLowerCase();
  if (/(تطوير|ويب|برمج|dev|web)/.test(text)) return 'dev';
  if (/(تسويق|إعلان|marketing|social)/.test(text)) return 'mkt';
  if (/(أمن|حماية|اختراق|security|سيبران)/.test(text)) return 'sec';
  return 'other';
}
function statusBadge(status) {
  const key = String(status || 'pending').toLowerCase();
  const meta = STATUS_META[key] || STATUS_META.pending;
  return `<span style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:var(--surface-muted);font-weight:700;color:var(--muted);">${meta.label}</span>`;
}
function getFilteredInvoices() {
  return allInvoices.filter(inv => {
    const dept = resolveDomain(inv);
    if (activeDept !== 'all' && dept !== activeDept) return false;
    if (activeStatus !== 'all' && String(inv.status||inv.payment_status||'').toLowerCase() !== activeStatus) return false;
    return true;
  });
}
function renderTable(list) {
  const container = document.getElementById('invoicesContainer');
  if (!list.length) {
    container.innerHTML = `<div class="inv-empty"><div class="ico">🧾</div><h3>لا توجد فواتير مطابقة</h3><p>غيّر القسم أو الحالة لمزيد من النتائج.</p></div>`;
    return;
  }
  const rows = list.map(inv => {
    const dept = resolveDomain(inv);
    const meta = DOMAIN_META[dept] || DOMAIN_META.other;
    return `
      <tr>
        <td>${escapeHtml(inv.invoice_number || inv.id || '')}</td>
        <td>${escapeHtml(inv.client_name || inv.client || inv.customer_name || '—')}</td>
        <td>
          <div class="inv-dom-cell">
            <div class="inv-dom-ico" style="background:${meta.gradient};">${meta.icon}</div>
            <div style="min-width:0;">
              <div style="font-weight:700;">${escapeHtml(inv.project_title || inv.project_name || '—')}</div>
              <div style="color:var(--muted);font-size:0.78rem;">${escapeHtml(meta.label)}</div>
            </div>
          </div>
        </td>
        <td class="inv-amount">${formatAmount(inv.amount)}</td>
        <td>${statusBadge(inv.status || inv.payment_status)}</td>
        <td>${formatDate(inv.invoice_date || inv.created_at || inv.date)}</td>
        <td>
          <div class="inv-actions">
            <button class="inv-action-btn" data-action="view" data-id="${inv.id}">عرض التفاصيل</button>
            <button class="inv-action-btn inv-delete-btn" data-action="delete" data-id="${inv.id}">حذف</button>
          </div>
        </td>
      </tr>`;
  }).join('');
  container.innerHTML = `
    <div class="inv-table-wrap">
      <table class="inv-table">
        <thead><tr><th>رقم الفاتورة</th><th>العميل</th><th>المشروع / القسم</th><th>المبلغ</th><th>الحالة</th><th>التاريخ</th><th>إجراءات</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  container.querySelectorAll('[data-action="view"]').forEach(btn => btn.addEventListener('click', () => viewInvoice(btn.dataset.id)));
  container.querySelectorAll('[data-action="delete"]').forEach(btn => btn.addEventListener('click', () => deleteInvoice(btn.dataset.id)));
}
function viewInvoice(id) {
  const inv = allInvoices.find(item => String(item.id) === String(id));
  if (!inv) return;
  alert(`عرض تفاصيل الفاتورة ${inv.invoice_number || inv.id}`);
}
function deleteInvoice(id) {
  if (!confirm('هل أنت متأكد من حذف هذه الفاتورة؟')) return;
  allInvoices = allInvoices.filter(item => String(item.id) !== String(id));
  renderTable(getFilteredInvoices());
  toast('تم حذف الفاتورة محلياً');
}
function renderAll() {
  renderTable(getFilteredInvoices());
}
async function loadInvoices() {
  document.getElementById('invoicesContainer').innerHTML = `<div class="inv-empty"><div class="ico">🧾</div><h3>جارٍ التحميل...</h3><p>انتظر لحظة.</p></div>`;
  try {
    const resp = await fetch(`${API_ORIGIN}/api/dashboard/invoices`, { headers: { Authorization: `Bearer ${token}` } });
    if (!resp.ok) throw new Error('تعذّر جلب الفواتير');
    const data = await resp.json();
    allInvoices = data.invoices || data.data || (Array.isArray(data) ? data : []);
  } catch (err) {
    console.error(err);
    allInvoices = [];
    toast(err.message || 'خطأ في تحميل الفواتير', false);
  }
  renderAll();
}

document.getElementById('departmentFilter').addEventListener('click', (event) => {
  const btn = event.target.closest('.dept-filter-btn');
  if (!btn) return;
  document.querySelectorAll('.dept-filter-btn').forEach(item => item.classList.remove('active'));
  btn.classList.add('active');
  activeDept = btn.dataset.department;
  renderAll();
});

document.getElementById('invChips').addEventListener('click', (event) => {
  const chip = event.target.closest('.inv-chip');
  if (!chip) return;
  document.querySelectorAll('.inv-chip').forEach(item => item.classList.remove('active'));
  chip.classList.add('active');
  activeStatus = chip.dataset.status;
  renderAll();
});

document.getElementById('btnRefreshInvoices').addEventListener('click', loadInvoices);

// Theme persistence and toggle
function applyTheme(dark) {
  document.body.classList.toggle('dark-mode', dark);
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
const initDark = localStorage.getItem('theme') === 'dark';
applyTheme(initDark);
document.getElementById('themeToggle')?.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark-mode')));

// Profile menu wiring for admin header (use wrapper class to show menu)
const profileBtn = document.getElementById('profileMenuBtn');
const profileMenuWrap = document.getElementById('profileMenuWrap');
if (profileBtn && profileMenuWrap) {
  profileBtn.addEventListener('click', (e) => { e.stopPropagation(); profileMenuWrap.classList.toggle('open'); });
  document.addEventListener('click', () => profileMenuWrap.classList.remove('open'));
}

const currentUser = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user') || '{}');

function showProfileNotice() {
  document.getElementById('profileMenuWrap')?.classList.remove('open');
  showProfileModal();
}

function logoutUser() {
  document.getElementById('profileMenuWrap')?.classList.remove('open');
  sessionStorage.removeItem('token');
  sessionStorage.removeItem('user');
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  window.location.href = 'login.html';
}

function showProfileModal() {
  const backdrop = document.getElementById('profileModalBackdrop');
  backdrop.classList.add('open');
  backdrop.setAttribute('aria-hidden', 'false');
  const user = currentUser || {};
  // populate full profile fields if present
  const first = document.getElementById('profile_first_name');
  const last = document.getElementById('profile_last_name');
  const email = document.getElementById('profile_email');
  const phone = document.getElementById('profile_phone');
  if (first) first.value = user.first_name || user.firstName || user.name || '';
  if (last) last.value = user.last_name || user.lastName || '';
  if (email) email.value = user.email || user.email_address || '';
  if (phone) phone.value = user.phone || user.mobile || '';
}

function closeProfileModal() {
  const backdrop = document.getElementById('profileModalBackdrop');
  backdrop.classList.remove('open');
  backdrop.setAttribute('aria-hidden', 'true');
}

function setOrderFilter(val) {
  // On invoices page, navigate to dashboard when user clicks dashboard tab
  if (window.location.pathname.endsWith('manager-invoices.html')) {
    window.location.href = 'manager-dashboard.html';
    return;
  }
}

function showUsersPanel() {
  // navigate to manager dashboard (users section)
  window.location.href = 'manager-dashboard.html';
}

loadInvoices();
</script>
